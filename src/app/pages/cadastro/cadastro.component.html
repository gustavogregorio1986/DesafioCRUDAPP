<h2>Cadastrar Lead</h2>

<form (ngSubmit)="salvar()">
  <!-- Campos do Lead -->
  <div class="mb-3">
    <label>Nome</label>
    <input [(ngModel)]="lead.name" name="name" required class="form-control">
  </div>

  <div class="mb-3">
    <label>Email</label>
    <input [(ngModel)]="lead.email" name="email" required email class="form-control">
  </div>

  <div class="mb-3">
    <label>Status</label>
    <select [(ngModel)]="lead.status" name="status" required class="form-select">
      <option value="New">New</option>
      <option value="Qualified">Qualified</option>
      <option value="Won">Won</option>
      <option value="Lost">Lost</option>
    </select>
  </div>

  <!-- Campos das Tasks -->
  <h3>Tarefas</h3>
  <div class="mb-3">
    <label>Título da tarefa</label>
    <input [(ngModel)]="novaTask.title" name="title" placeholder="Título da tarefa" class="form-control">
  </div>

  <div class="mb-3">
    <label>Status da tarefa</label>
    <select [(ngModel)]="novaTask.status" name="statusTask" class="form-select">
      <option value="Todo">Todo</option>
      <option value="Doing">Doing</option>
      <option value="Done">Done</option>
    </select>
  </div>

  <div class="mb-3">
    <label>Prazo (opcional)</label>
    <input [(ngModel)]="novaTask.dueDate" name="dueDate" type="date" class="form-control">
  </div>

  <button type="button" class="btn btn-secondary" (click)="adicionarTask()">Adicionar Tarefa</button>

  <!-- Lista de tarefas adicionadas -->
  <ul class="mt-3">
    <li *ngFor="let task of lead.tasks">
      {{ task.title }} - {{ task.status }}
      <span *ngIf="task.dueDate"> (Prazo: {{ task.dueDate }})</span>
    </li>
  </ul>

  <button type="submit" class="btn btn-success mt-3">Salvar Lead</button>
</form>
